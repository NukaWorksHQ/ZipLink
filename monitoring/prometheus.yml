global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'ziplink-server'
    static_configs:
      - targets: ['ziplink-server:8080']
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'ziplink-loadbalancer'
    static_configs:
      - targets: ['ziplink-loadbalancer:80']
    metrics_path: '/health'
    scrape_interval: 30s

  - job_name: 'docker-containers'
    static_configs:
      - targets: ['host.docker.internal:9323']