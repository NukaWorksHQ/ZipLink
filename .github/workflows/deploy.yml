name: Deploy ZipLink to Docker Swarm

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
  SERVER_IMAGE_NAME: ziplink/server
  WEB_IMAGE_NAME: ziplink/web

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract version
        id: extract_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=${GITHUB_SHA::8}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build and push Server image
        run: |
          IMAGE_TAG=${{ steps.extract_version.outputs.VERSION }}
          FULL_IMAGE_NAME=${{ env.REGISTRY_URL }}/${{ env.SERVER_IMAGE_NAME }}:$IMAGE_TAG

          echo "Building server image: $FULL_IMAGE_NAME"
          docker build -f Server/Dockerfile -t $FULL_IMAGE_NAME .
          docker push $FULL_IMAGE_NAME

          # Tag as latest for main branch
          if [[ $GITHUB_REF == refs/heads/master ]]; then
            LATEST_IMAGE_NAME=${{ env.REGISTRY_URL }}/${{ env.SERVER_IMAGE_NAME }}:latest
            docker tag $FULL_IMAGE_NAME $LATEST_IMAGE_NAME
            docker push $LATEST_IMAGE_NAME
          fi

      - name: Build and push Web image
        run: |
          IMAGE_TAG=${{ steps.extract_version.outputs.VERSION }}
          FULL_IMAGE_NAME=${{ env.REGISTRY_URL }}/${{ env.WEB_IMAGE_NAME }}:$IMAGE_TAG

          echo "Building web image: $FULL_IMAGE_NAME"
          docker build -f Web/Dockerfile -t $FULL_IMAGE_NAME .
          docker push $FULL_IMAGE_NAME

          # Tag as latest for main branch
          if [[ $GITHUB_REF == refs/heads/master ]]; then
            LATEST_IMAGE_NAME=${{ env.REGISTRY_URL }}/${{ env.WEB_IMAGE_NAME }}:latest
            docker tag $FULL_IMAGE_NAME $LATEST_IMAGE_NAME
            docker push $LATEST_IMAGE_NAME
          fi

      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SWARM_MANAGER_HOST }}
          username: cloud-user
          key: ${{ secrets.SWARM_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "SSH connection successful"
            whoami
            docker --version

      - name: Copy deployment files to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SWARM_MANAGER_HOST }}
          username: root
          key: ${{ secrets.SWARM_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Create temporary directory for deployment files
            mkdir -p /tmp/ziplink-deploy

      - name: Transfer docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SWARM_MANAGER_HOST }}
          username: root
          key: ${{ secrets.SWARM_SSH_PRIVATE_KEY }}
          port: 22
          source: "docker-compose.yml"
          target: "/tmp/ziplink-deploy/"

      - name: Transfer scripts directory
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SWARM_MANAGER_HOST }}
          username: root
          key: ${{ secrets.SWARM_SSH_PRIVATE_KEY }}
          port: 22
          source: "scripts/"
          target: "/tmp/ziplink-deploy/"

      - name: Transfer nginx configuration
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SWARM_MANAGER_HOST }}
          username: root
          key: ${{ secrets.SWARM_SSH_PRIVATE_KEY }}
          port: 22
          source: "nginx/"
          target: "/tmp/ziplink-deploy/"

      - name: Deploy to Docker Swarm
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SWARM_MANAGER_HOST }}
          username: cloud-user
          key: ${{ secrets.SWARM_SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e

            IMAGE_TAG=${{ steps.extract_version.outputs.VERSION }}

            echo "Deploying ZipLink version $IMAGE_TAG"

            # Create application directory structure
            mkdir -p /opt/ziplink/scripts
            mkdir -p /opt/ziplink/data/db-primary
            mkdir -p /opt/ziplink/data/db-replica

            # Navigate to application directory
            cd /opt/ziplink

            # Copy deployment files from temporary location
            if [ -d "/tmp/ziplink-deploy" ]; then
              cp -r /tmp/ziplink-deploy/* /opt/ziplink/
              chmod +x /opt/ziplink/scripts/*.sh
              rm -rf /tmp/ziplink-deploy
            fi

            # Generate .env.production from GitHub secrets
            cat > .env.production << EOF
            COMPOSE_PROJECT_NAME=ziplink-prod
            COMPOSE_FILE=docker-compose.yml

            # Base de données
            DB_SA_PASSWORD=${{ secrets.DB_SA_PASSWORD }}
            DB_USER_PASSWORD=${{ secrets.DB_USER_PASSWORD }}

            # JWT Configuration
            JWT_KEY=${{ secrets.JWT_KEY }}
            JWT_ISSUER=${{ secrets.JWT_ISSUER }}
            JWT_AUDIENCE=${{ secrets.JWT_AUDIENCE }}

            # Domaines
            DOMAIN=${{ secrets.DOMAIN }}
            ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}

            # Images Docker
            SERVER_IMAGE_TAG=$IMAGE_TAG
            WEB_IMAGE_TAG=$IMAGE_TAG
            REGISTRY_URL=${{ env.REGISTRY_URL }}

            # Ports
            DB_PRIMARY_PORT=1433
            DB_REPLICA_PORT=1434
            API_PORT_RANGE=8080-8081
            WEB_PORT_RANGE=8090-8091
            NGINX_HTTP_PORT=80
            NGINX_HTTPS_PORT=443
            MONITORING_PORT=9090
            EOF

            # Login to ECR from the remote server
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.REGISTRY_URL }}

            # Update the docker-compose.yml with new image tags
            export SERVER_IMAGE_TAG=$IMAGE_TAG
            export WEB_IMAGE_TAG=$IMAGE_TAG
            export REGISTRY_URL=${{ env.REGISTRY_URL }}

            # Deploy using the existing cluster management script
            echo "Deploying ZipLink stack..."
            source .env.production
            ./scripts/cluster-management.sh deploy

            # Wait for services to be ready
            echo "Waiting for services to be ready..."
            sleep 30

            # Check service status
            echo "Service status:"
            docker stack services ziplink

            echo "Deployment completed successfully!"
            echo "Application available at: http://${{ secrets.SWARM_MANAGER_HOST }}"
