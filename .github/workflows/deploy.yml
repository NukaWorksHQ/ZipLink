name: Build and Push ZipLink Images to ECR

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY_URL: ${{ secrets.ECR_REGISTRY_URL }}
  SERVER_IMAGE_NAME: ziplink/server
  WEB_IMAGE_NAME: ziplink/web

jobs:
  build-and-push:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract version
        id: extract_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=${GITHUB_SHA::8}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build and push Server image
        run: |
          IMAGE_TAG=${{ steps.extract_version.outputs.VERSION }}
          FULL_IMAGE_NAME=${{ env.REGISTRY_URL }}/${{ env.SERVER_IMAGE_NAME }}:$IMAGE_TAG

          echo "Building server image: $FULL_IMAGE_NAME"
          docker build -f Server/Dockerfile -t $FULL_IMAGE_NAME .
          docker push $FULL_IMAGE_NAME

          # Tag as latest for main branch
          if [[ $GITHUB_REF == refs/heads/master ]]; then
            LATEST_IMAGE_NAME=${{ env.REGISTRY_URL }}/${{ env.SERVER_IMAGE_NAME }}:latest
            docker tag $FULL_IMAGE_NAME $LATEST_IMAGE_NAME
            docker push $LATEST_IMAGE_NAME
          fi

      - name: Build and push Web image
        run: |
          IMAGE_TAG=${{ steps.extract_version.outputs.VERSION }}
          FULL_IMAGE_NAME=${{ env.REGISTRY_URL }}/${{ env.WEB_IMAGE_NAME }}:$IMAGE_TAG

          echo "Building web image: $FULL_IMAGE_NAME"
          docker build -f Web/Dockerfile -t $FULL_IMAGE_NAME .
          docker push $FULL_IMAGE_NAME

          # Tag as latest for main branch
          if [[ $GITHUB_REF == refs/heads/master ]]; then
            LATEST_IMAGE_NAME=${{ env.REGISTRY_URL }}/${{ env.WEB_IMAGE_NAME }}:latest
            docker tag $FULL_IMAGE_NAME $LATEST_IMAGE_NAME
            docker push $LATEST_IMAGE_NAME
          fi
