events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Configuration des logs
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
    
    # Configuration générale
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/wasm;

    # Upstream pour le backend API (2 répliques)
    upstream ziplink_api {
        least_conn;
        server ziplink-server:8080 max_fails=3 fail_timeout=30s;
        server ziplink-server:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    # Upstream pour le frontend Web (2 répliques)
    upstream ziplink_web {
        least_conn;
        server ziplink-web:80 max_fails=3 fail_timeout=30s;
        server ziplink-web:80 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Configuration principale du serveur
    server {
        listen 80;
        server_name localhost ziplink.local *.ziplink.local;
        
        # Headers de sécurité
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Configuration pour les WebSockets (si nécessaire pour SignalR)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Route pour l'API
        location /api/ {
            proxy_pass http://ziplink_api;
            proxy_timeout 30s;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
            
            # Headers pour l'API
            proxy_set_header Accept-Encoding gzip;
        }
        
        # Route pour les fichiers statiques du Web
        location /_framework/ {
            proxy_pass http://ziplink_web;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Route pour les autres assets statiques
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|wasm)$ {
            proxy_pass http://ziplink_web;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Route principale pour l'application Web
        location / {
            proxy_pass http://ziplink_web;
            proxy_timeout 30s;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }
        
        # Page de statut de santé
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Gestion des erreurs
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
    
    # Configuration HTTPS (optionnelle)
    # server {
    #     listen 443 ssl http2;
    #     server_name localhost ziplink.local *.ziplink.local;
    #     
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #     
    #     # Même configuration que HTTP
    #     include /etc/nginx/conf.d/ziplink-locations.conf;
    # }
}