events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Configuration simplifiée pour le développement
    sendfile on;
    keepalive_timeout 65;
    
    # Configuration basique sans upstream (développement)
    server {
        listen 80;
        server_name localhost;
        
        # Route pour l'API
        location /api/ {
            proxy_pass http://ziplink-server:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Route pour l'application Web
        location / {
            proxy_pass http://ziplink-web:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Page de statut de santé
        location /health {
            access_log off;
            return 200 "healthy - development\n";
            add_header Content-Type text/plain;
        }
    }
}