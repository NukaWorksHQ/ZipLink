version: "3.8"

services:
  # Base de données SQL Server principale
  ziplink-db-primary:
    image: mcr.microsoft.com/mssql/server:2022-latest
    hostname: ziplink-db-primary
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_SA_PASSWORD}
      - DB_USER_PASSWORD=${DB_USER_PASSWORD}
      - MSSQL_PID=Express
      - MSSQL_AGENT_ENABLED=true
    ports:
      - "${DB_PRIMARY_PORT:-1433}:1433"
    volumes:
      - ${DB_PRIMARY_VOLUME:-ziplink_db_primary_data}:/var/opt/mssql
      - ./sql-scripts:/docker-entrypoint-initdb.d
    networks:
      - ziplink-network
    restart: unless-stopped
    deploy:
      placement:
        constraints:
          - node.labels.${DB_PRIMARY_NODE_LABEL:-database.primary==true}
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P '${DB_SA_PASSWORD}' -Q 'SELECT 1' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Base de données SQL Server réplique (sur un nœud différent)
  ziplink-db-replica:
    image: mcr.microsoft.com/mssql/server:2022-latest
    hostname: ziplink-db-replica
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_SA_PASSWORD}
      - DB_USER_PASSWORD=${DB_USER_PASSWORD}
      - MSSQL_PID=Express
      - MSSQL_AGENT_ENABLED=true
    ports:
      - "${DB_REPLICA_PORT:-1434}:1433"
    volumes:
      - ${DB_REPLICA_VOLUME:-ziplink_db_replica_data}:/var/opt/mssql
    networks:
      - ziplink-network
    restart: unless-stopped
    depends_on:
      ziplink-db-primary:
        condition: service_healthy
    deploy:
      placement:
        constraints:
          - node.labels.${DB_REPLICA_NODE_LABEL:-database.replica==true}
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P '${DB_SA_PASSWORD}' -Q 'SELECT 1' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Serveur API Backend avec 2 répliques
  ziplink-server:
    build:
      context: .
      dockerfile: Server/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=ziplink-db-primary,1433;Database=ZIPLINK;User Id=SA;Password=${DB_SA_PASSWORD};TrustServerCertificate=True;
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER:-ZipLink}
      - Jwt__Audience=${JWT_AUDIENCE:-https://ziplink.local}
    ports:
      - "${API_PORT_RANGE:-8080-8081}:8080"
    depends_on:
      ziplink-db-primary:
        condition: service_healthy
    networks:
      - ziplink-network
    restart: unless-stopped
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      # Configuration pour la répartition sur différents nœuds
      placement:
        max_replicas_per_node: 1
      # resources:
      #   limits:
      #     cpus: "0.5"
      #     memory: 512M
      #   reservations:
      #     cpus: "0.25"
      #     memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Client Web Blazor avec 2 répliques
  ziplink-web:
    build:
      context: .
      dockerfile: Web/Dockerfile
    ports:
      - "${WEB_PORT_RANGE:-8090-8091}:80"
    depends_on:
      - ziplink-server
    networks:
      - ziplink-network
    restart: unless-stopped
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      # Configuration pour la répartition sur différents nœuds
      placement:
        max_replicas_per_node: 1
      # resources:
      #   limits:
      #     cpus: "0.25"
      #     memory: 256M
      #   reservations:
      #     cpus: "0.125"
      #     memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Load Balancer Nginx
  ziplink-loadbalancer:
    image: nginx:alpine
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - ziplink-server
      - ziplink-web
    networks:
      - ziplink-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Service de monitoring
  ziplink-monitor:
    image: prom/prometheus:latest
    ports:
      - "${MONITORING_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ${PROMETHEUS_VOLUME:-prometheus_data}:/prometheus
    networks:
      - ziplink-network
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"

volumes:
  ziplink_db_primary_data:
    driver: local
  ziplink_db_replica_data:
    driver: local
  prometheus_data:
    driver: local

networks:
  ziplink-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
