apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: ziplink-production

namespace: ziplink

resources:
- ../../base
- ecr-config.yaml

patchesStrategicMerge:
- patches/server-patch.yaml
- patches/postgres-patch.yaml
- patches/ingress-patch.yaml

secretGenerator:
- name: ziplink-server-secrets
  behavior: merge
  literals:
  - JWT_KEY=${JWT_PRODUCTION_KEY}

replicas:
- name: ziplink-server
  count: 3
- name: ziplink-web
  count: 2
- name: ziplink-postgres
  count: 1

images:
- name: ziplink-server
  newName: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/ziplink-server
  newTag: v1.0.0
- name: ziplink-web
  newName: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/ziplink-web
  newTag: v1.0.0

namePrefix: prod-

commonLabels:
  environment: production
  tier: prod