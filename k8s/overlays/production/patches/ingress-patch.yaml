apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ziplink-ingress
  namespace: ziplink
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - ziplink.production.com
    secretName: ziplink-tls-secret
  rules:
  - host: ziplink.production.com
    http:
      paths:
      - path: /api/(.*)
        pathType: Prefix
        backend:
          service:
            name: ziplink-server-service
            port:
              number: 8080
      - path: /(.*)
        pathType: Prefix
        backend:
          service:
            name: ziplink-web-service
            port:
              number: 80