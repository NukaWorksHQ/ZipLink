# ECR Token Refresh CronJob - Met à jour automatiquement le token ECR
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-registry-helper
  namespace: ziplink
  labels:
    app.kubernetes.io/name: ziplink
    app.kubernetes.io/component: ecr-auth
spec:
  schedule: "0 */8 * * *"  # Toutes les 8 heures (tokens ECR expirent après 12h)
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: ziplink
            app.kubernetes.io/component: ecr-auth-job
        spec:
          serviceAccountName: ziplink-ecr-sa
          automountServiceAccountToken: true
          restartPolicy: Never
          containers:
          - name: ecr-registry-helper
            image: amazon/aws-cli:2.15.30
            imagePullPolicy: IfNotPresent
            envFrom:
            - secretRef:
                name: aws-ecr-config
            command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "🔐 Generating ECR login token..."
              
              # Décoder les variables d'environnement
              export AWS_DEFAULT_REGION=$(echo $AWS_REGION | base64 -d)
              export AWS_ACCOUNT_ID_DECODED=$(echo $AWS_ACCOUNT_ID | base64 -d)
              export REGISTRY_SERVER="${AWS_ACCOUNT_ID_DECODED}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
              
              # Obtenir le token ECR
              TOKEN=$(aws ecr get-login-password --region $AWS_DEFAULT_REGION)
              
              # Créer/Mettre à jour le secret Docker
              kubectl create secret docker-registry ecr-registry-secret \
                --docker-server=$REGISTRY_SERVER \
                --docker-username=AWS \
                --docker-password=$TOKEN \
                --namespace=ziplink \
                --dry-run=client -o yaml | kubectl apply -f -
              
              echo "✅ ECR registry secret updated successfully"
              
              # Patch le ServiceAccount par défaut pour utiliser le secret
              kubectl patch serviceaccount default -n ziplink -p '{"imagePullSecrets":[{"name":"ecr-registry-secret"}]}'
              
              echo "✅ Default ServiceAccount patched with ECR secret"
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
                ephemeral-storage: "100Mi"
              limits:
                memory: "128Mi"
                cpu: "100m"
                ephemeral-storage: "200Mi"
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
              runAsUser: 1001
              capabilities:
                drop:
                - ALL
              readOnlyRootFilesystem: true
            volumeMounts:
            - name: tmp
              mountPath: /tmp
          volumes:
          - name: tmp
            emptyDir: {}
---
# Job initial pour créer le secret immédiatement au déploiement
apiVersion: batch/v1
kind: Job
metadata:
  name: ecr-registry-helper-init
  namespace: ziplink
  labels:
    app.kubernetes.io/name: ziplink
    app.kubernetes.io/component: ecr-auth-init
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ziplink
        app.kubernetes.io/component: ecr-auth-init-job
    spec:
      serviceAccountName: ziplink-ecr-sa
      automountServiceAccountToken: true
      restartPolicy: Never
      containers:
      - name: ecr-registry-helper
        image: amazon/aws-cli:2.15.30
        imagePullPolicy: IfNotPresent
        envFrom:
        - secretRef:
            name: aws-ecr-config
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "🚀 Initial ECR login token generation..."
          
          # Décoder les variables d'environnement
          export AWS_DEFAULT_REGION=$(echo $AWS_REGION | base64 -d)
          export AWS_ACCOUNT_ID_DECODED=$(echo $AWS_ACCOUNT_ID | base64 -d)
          export REGISTRY_SERVER="${AWS_ACCOUNT_ID_DECODED}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
          
          # Obtenir le token ECR
          TOKEN=$(aws ecr get-login-password --region $AWS_DEFAULT_REGION)
          
          # Créer le secret Docker
          kubectl create secret docker-registry ecr-registry-secret \
            --docker-server=$REGISTRY_SERVER \
            --docker-username=AWS \
            --docker-password=$TOKEN \
            --namespace=ziplink \
            --dry-run=client -o yaml | kubectl apply -f -
          
          echo "✅ Initial ECR registry secret created successfully"
          
          # Patch le ServiceAccount par défaut
          kubectl patch serviceaccount default -n ziplink -p '{"imagePullSecrets":[{"name":"ecr-registry-secret"}]}'
          
          echo "✅ Default ServiceAccount configured for ECR"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
            ephemeral-storage: "100Mi"
          limits:
            memory: "128Mi"
            cpu: "100m"
            ephemeral-storage: "200Mi"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}