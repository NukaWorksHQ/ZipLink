# AWS ECR Service Account avec IRSA (IAM Roles for Service Accounts)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ziplink-ecr-sa
  namespace: ziplink
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/ziplink-ecr-role
    eks.amazonaws.com/sts-regional-endpoints: "true"
  labels:
    app.kubernetes.io/name: ziplink
    app.kubernetes.io/component: ecr-auth
automountServiceAccountToken: true
imagePullSecrets:
- name: ecr-registry-secret
---
# ECR Registry Secret template (sera créé par le CronJob)
apiVersion: v1
kind: Secret
metadata:
  name: ecr-registry-secret
  namespace: ziplink
  labels:
    app.kubernetes.io/name: ziplink
    app.kubernetes.io/component: ecr-auth
type: kubernetes.io/dockerconfigjson
data:
  # Ce secret sera automatiquement mis à jour par le CronJob ecr-registry-helper
  .dockerconfigjson: eyJhdXRocyI6e319
---
# ClusterRole pour l'accès ECR
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ziplink-ecr-role
  labels:
    app.kubernetes.io/name: ziplink
    app.kubernetes.io/component: ecr-auth
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["get", "list", "patch"]
---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ziplink-ecr-binding
  labels:
    app.kubernetes.io/name: ziplink
    app.kubernetes.io/component: ecr-auth
subjects:
- kind: ServiceAccount
  name: ziplink-ecr-sa
  namespace: ziplink
roleRef:
  kind: ClusterRole
  name: ziplink-ecr-role
  apiGroup: rbac.authorization.k8s.io