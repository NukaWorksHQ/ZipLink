# AWS ECR Configuration
apiVersion: v1
kind: Secret
metadata:
  name: aws-ecr-config
  namespace: ziplink
  labels:
    app.kubernetes.io/name: ziplink
    app.kubernetes.io/component: ecr
type: Opaque
data:
  # AWS_REGION: Base64 encoded AWS region (us-east-1)
  AWS_REGION: dXMtZWFzdC0x
  # AWS_ACCOUNT_ID: Base64 encoded AWS Account ID (replace with your account ID)
  AWS_ACCOUNT_ID: MTIzNDU2Nzg5MDEy