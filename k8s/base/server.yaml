apiVersion: apps/v1
kind: Deployment
metadata:
  name: ziplink-server
  namespace: ziplink
  labels:
    app.kubernetes.io/name: ziplink-server
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ziplink-server
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ziplink-server
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: default
      automountServiceAccountToken: false
      imagePullSecrets:
      - name: ecr-registry-secret
      containers:
      - name: ziplink-server
        image: ziplink-server:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: ziplink-server-config
              key: ASPNETCORE_ENVIRONMENT
        - name: ASPNETCORE_URLS
          valueFrom:
            configMapKeyRef:
              name: ziplink-server-config
              key: ASPNETCORE_URLS
        - name: Jwt__Issuer
          valueFrom:
            configMapKeyRef:
              name: ziplink-server-config
              key: Jwt__Issuer
        - name: Jwt__Audience
          valueFrom:
            configMapKeyRef:
              name: ziplink-server-config
              key: Jwt__Audience
        - name: Jwt__Key
          valueFrom:
            secretKeyRef:
              name: ziplink-server-secrets
              key: JWT_KEY
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: ziplink-server-secrets
              key: ConnectionStrings__DefaultConnection
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 6
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: ziplink-server-service
  namespace: ziplink
  labels:
    app.kubernetes.io/name: ziplink-server
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: ziplink-server
    app.kubernetes.io/component: backend