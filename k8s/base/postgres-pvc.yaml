apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ziplink-postgres-pvc
  namespace: ziplink
  labels:
    app.kubernetes.io/name: ziplink-postgres
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: local-path # K3s default storage class